<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
</head>
<body>
    <h2>Регистрация нового пользователя</h2>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}
    {% if success %}
        <p style="color:green;">{{ success }}</p>
    {% endif %}

    <form method="post">
        <input name="login" placeholder="логин" required><br><br>
        <input name="pwd1" placeholder="пароль" type="password" required><br><br>
        <input name="pwd2" placeholder="повтор пароля" type="password" required><br><br>
        <button type="submit">Зарегистрироваться</button>
    </form>

    <p>Если вспомнил, что есть аккаунт: <a href="{{ url_for('login') }}">Войти</a></p>
</body>
</html>
