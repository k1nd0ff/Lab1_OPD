<!doctype html>
<title>Регистрация</title>
<h2>Создать аккаунт</h2>
<form method="post">
    <label>Логин: <input name="login"></label><br>
    <label>Пароль: <input name="password" type="password"></label><br>
    <button type="submit">Создать</button>
</form>

<p>Если вспомнил, что есть аккаунт <a href="{{ url_for('login') }}">Войти</a></p>

{% with messages = get_flashed_messages() %}
  {% if messages %}
    <ul>
      {% for m in messages %}
        <li>{{ m }}</li>
      {% endfor %}
    </ul>
  {% endif %}
{% endwith %}
