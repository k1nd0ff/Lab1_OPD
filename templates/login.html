<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
</head>
<body>
    <h2>Вход в приложение</h2>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="post">
        <input name="login" placeholder="логин" required>
        <input name="pwd"   placeholder="пароль" type="password" required>
        <button type="submit">Войти</button>
    </form>

    <p>Если нету аккаунта: <a href="{{ url_for('reg') }}">Создать</a></p>
</body>
</html>
